name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Generate Gradle Wrapper
        run: |
          # gradle/actions/setup-gradle installs gradle to PATH, use it to generate wrapper jar
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: DoBao-TTS-Debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: DoBao-TTS-Release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Get APK info
        run: |
          echo "=== Debug APK ==="
          ls -lh app/build/outputs/apk/debug/ || echo "No debug APK"
          echo "=== Release APK ==="
          ls -lh app/build/outputs/apk/release/ || echo "No release APK"
